<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700" font-family="'Noto Sans TC','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071a2e"/><stop offset="100%" stop-color="#0d2540"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#4da8e8"/></marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f5c842"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#56d98a"/></marker>
  </defs>
  <rect width="780" height="700" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="778" height="698" rx="12" fill="none" stroke="#163556"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" fill="#f5c842" font-size="18" font-weight="700">📦 快取架構 Caching Architecture</text>
  <line x1="60" y1="50" x2="720" y2="50" stroke="#163556"/>

  <!-- ── Layer 1: Browser (localStorage) ── -->
  <rect x="50" y="70" width="680" height="200" rx="10" fill="#0a1e33" stroke="#4da8e8" stroke-width="1.5"/>
  <rect x="50" y="70" width="680" height="30" rx="10" fill="rgba(77,168,232,.15)"/>
  <!-- fix bottom corners of header -->
  <rect x="50" y="90" width="680" height="10" fill="rgba(77,168,232,.15)"/>
  <text x="70" y="90" fill="#4da8e8" font-size="14" font-weight="700">🌐  Browser (localStorage)</text>
  <text x="630" y="90" fill="#6a8faa" font-size="11">LRU 驅逐 · 40 key 上限</text>

  <!-- Cache entries -->
  <rect x="75" y="112" width="195" height="48" rx="6" fill="rgba(77,168,232,.06)" stroke="#163556"/>
  <text x="90" y="130" fill="#56d98a" font-size="11" font-weight="600">tdx_od_{from}_{to}</text>
  <text x="90" y="148" fill="#6a8faa" font-size="10">TTL: 30 分鐘</text>
  <rect x="224" y="130" width="36" height="14" rx="3" fill="rgba(77,168,232,.15)"/>
  <text x="242" y="141" text-anchor="middle" fill="#4da8e8" font-size="9">OD</text>

  <rect x="285" y="112" width="195" height="48" rx="6" fill="rgba(77,168,232,.06)" stroke="#163556"/>
  <text x="300" y="130" fill="#56d98a" font-size="11" font-weight="600">tdx_daily_{…}_{date}</text>
  <text x="300" y="148" fill="#6a8faa" font-size="10">TTL: 7 天</text>
  <rect x="430" y="130" width="40" height="14" rx="3" fill="rgba(245,200,66,.15)"/>
  <text x="450" y="141" text-anchor="middle" fill="#f5c842" font-size="9">Daily</text>

  <rect x="495" y="112" width="220" height="48" rx="6" fill="rgba(77,168,232,.06)" stroke="#163556"/>
  <text x="510" y="130" fill="#56d98a" font-size="11" font-weight="600">tra_station_groups_v2</text>
  <text x="510" y="148" fill="#6a8faa" font-size="10">TTL: 30 天</text>

  <rect x="75" y="170" width="145" height="48" rx="6" fill="rgba(77,168,232,.06)" stroke="#163556"/>
  <text x="90" y="188" fill="#56d98a" font-size="11" font-weight="600">tdx_detail_alert</text>
  <text x="90" y="206" fill="#6a8faa" font-size="10">TTL: 15 分鐘</text>

  <rect x="235" y="170" width="145" height="48" rx="6" fill="rgba(77,168,232,.06)" stroke="#163556"/>
  <text x="250" y="188" fill="#56d98a" font-size="11" font-weight="600">tdx_detail_news</text>
  <text x="250" y="206" fill="#6a8faa" font-size="10">TTL: 15 分鐘</text>

  <rect x="395" y="170" width="115" height="48" rx="6" fill="rgba(245,200,66,.06)" stroke="#163556"/>
  <text x="410" y="188" fill="#f5c842" font-size="11" font-weight="600">tdx_prefs</text>
  <text x="410" y="206" fill="#6a8faa" font-size="10">TTL: ∞ 永久</text>

  <rect x="525" y="170" width="190" height="48" rx="6" fill="rgba(245,200,66,.06)" stroke="#163556"/>
  <text x="540" y="188" fill="#f5c842" font-size="11" font-weight="600">tdx_stn_mode · cache_ver</text>
  <text x="540" y="206" fill="#6a8faa" font-size="10">TTL: ∞ 永久</text>

  <!-- Arrow: cache miss -->
  <line x1="390" y1="275" x2="390" y2="305" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="278" width="120" height="20" rx="4" fill="rgba(248,113,113,.12)" stroke="none"/>
  <text x="390" y="293" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">cache miss ▼</text>

  <!-- ── Layer 2: Flask (in-memory) ── -->
  <rect x="50" y="310" width="680" height="190" rx="10" fill="#0a1e33" stroke="#56d98a" stroke-width="1.5"/>
  <rect x="50" y="310" width="680" height="30" rx="10" fill="rgba(86,217,138,.15)"/>
  <rect x="50" y="330" width="680" height="10" fill="rgba(86,217,138,.15)"/>
  <text x="70" y="330" fill="#56d98a" font-size="14" font-weight="700">⚡  Flask Server (in-memory dicts)</text>
  <text x="610" y="330" fill="#6a8faa" font-size="11">執行緒安全 🔒</text>

  <!-- Server caches - row 1 -->
  <rect x="75" y="352" width="150" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="90" y="370" fill="#c8dff0" font-size="11" font-weight="600">_timetable_cache</text>
  <text x="90" y="388" fill="#56d98a" font-size="11" font-weight="700">12 小時</text>

  <rect x="240" y="352" width="130" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="255" y="370" fill="#c8dff0" font-size="11" font-weight="600">_daily_cache</text>
  <text x="255" y="388" fill="#56d98a" font-size="11" font-weight="700">7 天</text>

  <rect x="385" y="352" width="130" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="400" y="370" fill="#c8dff0" font-size="11" font-weight="600">_od_cache</text>
  <text x="400" y="388" fill="#56d98a" font-size="11" font-weight="700">30 分鐘</text>

  <rect x="530" y="352" width="185" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="545" y="370" fill="#c8dff0" font-size="11" font-weight="600">_liveboard_cache</text>
  <text x="545" y="388" fill="#56d98a" font-size="11" font-weight="700">120 秒</text>

  <!-- Server caches - row 2 -->
  <rect x="75" y="412" width="150" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="90" y="430" fill="#c8dff0" font-size="11" font-weight="600">_trainlive_cache</text>
  <text x="90" y="448" fill="#56d98a" font-size="11" font-weight="700">120 秒</text>

  <rect x="240" y="412" width="130" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="255" y="430" fill="#c8dff0" font-size="11" font-weight="600">_alert_cache</text>
  <text x="255" y="448" fill="#56d98a" font-size="11" font-weight="700">15 分鐘</text>

  <rect x="385" y="412" width="130" height="48" rx="6" fill="rgba(86,217,138,.06)" stroke="#163556"/>
  <text x="400" y="430" fill="#c8dff0" font-size="11" font-weight="600">_news_cache</text>
  <text x="400" y="448" fill="#56d98a" font-size="11" font-weight="700">1 小時</text>

  <!-- Arrows: cache miss + startup load -->
  <line x1="260" y1="505" x2="260" y2="545" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="535" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">cache miss ▼</text>

  <line x1="520" y1="545" x2="520" y2="505" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowGold)"/>
  <text x="520" y="535" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">▲ startup load</text>

  <!-- ── Layer 3: External sources ── -->
  <!-- TDX API box -->
  <rect x="50" y="555" width="350" height="120" rx="10" fill="#0a1e33" stroke="#f5c842" stroke-width="1.5"/>
  <rect x="50" y="555" width="350" height="30" rx="10" fill="rgba(245,200,66,.15)"/>
  <rect x="50" y="575" width="350" height="10" fill="rgba(245,200,66,.15)"/>
  <text x="70" y="575" fill="#f5c842" font-size="14" font-weight="700">🌍  TDX API</text>

  <text x="75" y="604" fill="#c8dff0" font-size="11">• OAuth2 client_credentials 認證</text>
  <text x="75" y="624" fill="#c8dff0" font-size="11">• 金鑰池 round-robin (多組 Key)</text>
  <text x="75" y="644" fill="#c8dff0" font-size="11">• 滑動視窗速率限制 (5 req / 60s per key)</text>
  <text x="75" y="664" fill="#c8dff0" font-size="11">• 429 → 冷卻 60s · 401 → 刷新 token</text>

  <!-- Disk JSON box -->
  <rect x="430" y="555" width="300" height="120" rx="10" fill="#0a1e33" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="430" y="555" width="300" height="30" rx="10" fill="rgba(251,146,60,.15)"/>
  <rect x="430" y="575" width="300" height="10" fill="rgba(251,146,60,.15)"/>
  <text x="450" y="575" fill="#fb923c" font-size="14" font-weight="700">💾  Disk JSON Files</text>

  <rect x="455" y="596" width="250" height="30" rx="6" fill="rgba(251,146,60,.06)" stroke="#163556"/>
  <text x="470" y="616" fill="#c8dff0" font-size="12">seed_data.json</text>
  <text x="618" y="616" fill="#6a8faa" font-size="10">車站資料</text>

  <rect x="455" y="636" width="250" height="30" rx="6" fill="rgba(251,146,60,.06)" stroke="#163556"/>
  <text x="470" y="656" fill="#c8dff0" font-size="12">timetable_cache.json</text>
  <text x="638" y="656" fill="#6a8faa" font-size="10">快取</text>

</svg>
