<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" font-family="'Noto Sans TC','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071a2e"/><stop offset="100%" stop-color="#0d2540"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#4da8e8"/></marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f5c842"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#56d98a"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#fb923c"/></marker>
    <marker id="arrowDim" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6a8faa"/></marker>
  </defs>
  <rect width="960" height="800" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="798" rx="12" fill="none" stroke="#163556"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#f5c842" font-size="20" font-weight="700">🔄 頁面載入序列 (Page Load Sequence)</text>
  <line x1="60" y1="52" x2="900" y2="52" stroke="#163556"/>

  <!-- Column headers -->
  <rect x="50"  y="68" width="170" height="34" rx="6" fill="rgba(77,168,232,.15)"/>
  <text x="135" y="90" text-anchor="middle" fill="#4da8e8" font-size="14" font-weight="600">瀏覽器 (Browser)</text>
  <rect x="280" y="68" width="170" height="34" rx="6" fill="rgba(86,217,138,.15)"/>
  <text x="365" y="90" text-anchor="middle" fill="#56d98a" font-size="14" font-weight="600">伺服器 (Flask)</text>
  <rect x="510" y="68" width="170" height="34" rx="6" fill="rgba(251,146,60,.15)"/>
  <text x="595" y="90" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">磁碟快取 (Disk)</text>
  <rect x="740" y="68" width="170" height="34" rx="6" fill="rgba(245,200,66,.15)"/>
  <text x="825" y="90" text-anchor="middle" fill="#f5c842" font-size="14" font-weight="600">TDX API</text>

  <!-- Lifelines -->
  <line x1="135" y1="108" x2="135" y2="780" stroke="#163556" stroke-dasharray="4"/>
  <line x1="365" y1="108" x2="365" y2="780" stroke="#163556" stroke-dasharray="4"/>
  <line x1="595" y1="108" x2="595" y2="780" stroke="#163556" stroke-dasharray="4"/>
  <line x1="825" y1="108" x2="825" y2="780" stroke="#163556" stroke-dasharray="4"/>

  <!-- Step 1: GET / -->
  <line x1="135" y1="135" x2="360" y2="135" stroke="#4da8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="128" text-anchor="middle" fill="#c8dff0" font-size="12" font-weight="500">GET /</text>

  <!-- Step 2: load seeds (startup) -->
  <line x1="365" y1="162" x2="590" y2="162" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="475" y="155" text-anchor="middle" fill="#fb923c" font-size="11">載入種子資料 (Load seed_data.json)</text>

  <line x1="365" y1="190" x2="590" y2="190" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="475" y="183" text-anchor="middle" fill="#fb923c" font-size="11">載入時刻表快取 (Load timetable_cache)</text>

  <!-- Step 3: return HTML -->
  <line x1="360" y1="222" x2="140" y2="222" stroke="#56d98a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="245" y="214" text-anchor="middle" fill="#56d98a" font-size="11">回傳 HTML (STATIONS + CITY_STATIONS)</text>

  <!-- Step 4: check localStorage -->
  <rect x="55" y="244" width="162" height="32" rx="6" fill="rgba(245,200,66,.1)" stroke="#f5c842" stroke-width="1" stroke-dasharray="3"/>
  <text x="136" y="265" text-anchor="middle" fill="#f5c842" font-size="11">檢查本機快取 (localStorage)</text>

  <!-- Branch: cache hit -->
  <rect x="46" y="292" width="180" height="48" rx="6" fill="rgba(86,217,138,.08)" stroke="#56d98a" stroke-width="1"/>
  <text x="136" y="312" text-anchor="middle" fill="#56d98a" font-size="12" font-weight="600">✅ 快取命中 (Cache Hit)</text>
  <text x="136" y="330" text-anchor="middle" fill="#c8dff0" font-size="11">從本機快取渲染 (Render from local)</text>

  <!-- Branch: cache miss -->
  <rect x="46" y="356" width="180" height="30" rx="6" fill="rgba(248,113,113,.08)" stroke="#f87171" stroke-width="1"/>
  <text x="136" y="376" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">❌ 快取未命中 (Cache Miss)</text>

  <!-- Step 5: API call -->
  <line x1="135" y1="404" x2="360" y2="404" stroke="#4da8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="396" text-anchor="middle" fill="#c8dff0" font-size="11">/api/trains/daily?from=…&amp;to=…&amp;date=…</text>

  <!-- Server checks cache -->
  <rect x="285" y="420" width="162" height="32" rx="6" fill="rgba(245,200,66,.1)" stroke="#f5c842" stroke-width="1" stroke-dasharray="3"/>
  <text x="366" y="441" text-anchor="middle" fill="#f5c842" font-size="11">檢查記憶體快取 (_daily_cache)</text>

  <!-- Server cache hit -->
  <rect x="270" y="468" width="190" height="30" rx="6" fill="rgba(86,217,138,.08)" stroke="#56d98a" stroke-width="1"/>
  <text x="365" y="488" text-anchor="middle" fill="#56d98a" font-size="11">伺服器快取命中 (Hit) → 直接回傳</text>

  <!-- Server cache miss → TDX -->
  <rect x="270" y="512" width="190" height="30" rx="6" fill="rgba(248,113,113,.08)" stroke="#f87171" stroke-width="1"/>
  <text x="365" y="532" text-anchor="middle" fill="#f87171" font-size="11">伺服器快取未命中 (Miss)</text>

  <line x1="365" y1="556" x2="820" y2="556" stroke="#f5c842" stroke-width="2" marker-end="url(#arrowGold)"/>
  <text x="590" y="548" text-anchor="middle" fill="#f5c842" font-size="11">呼叫 DailyTrainTimetable (Fetch)</text>

  <line x1="820" y1="582" x2="370" y2="582" stroke="#56d98a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="590" y="576" text-anchor="middle" fill="#56d98a" font-size="11">回傳完整每日時刻表 (Full Daily Timetable)</text>

  <!-- filter + disk write -->
  <text x="370" y="610" fill="#c8dff0" font-size="11">篩選路線 filter_od() → ab[], ba[]</text>
  <line x1="365" y1="622" x2="590" y2="622" stroke="#6a8faa" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrowDim)"/>
  <text x="475" y="617" text-anchor="middle" fill="#6a8faa" font-size="10">背景寫入磁碟 (Background Disk Write)</text>

  <!-- Return JSON -->
  <line x1="360" y1="650" x2="140" y2="650" stroke="#56d98a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="245" y="643" text-anchor="middle" fill="#56d98a" font-size="11">回傳 JSON {ab, ba}</text>

  <!-- Store + render -->
  <rect x="46" y="666" width="180" height="30" rx="6" fill="rgba(86,217,138,.08)" stroke="#56d98a" stroke-width="1"/>
  <text x="136" y="686" text-anchor="middle" fill="#c8dff0" font-size="11">存入本機快取並渲染 (Store &amp; Render)</text>

  <!-- LiveBoard -->
  <line x1="135" y1="718" x2="360" y2="718" stroke="#4da8e8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="710" text-anchor="middle" fill="#c8dff0" font-size="11">即時看板 /api/liveboard × 2</text>

  <line x1="365" y1="742" x2="820" y2="742" stroke="#f5c842" stroke-width="2" marker-end="url(#arrowGold)"/>
  <text x="590" y="735" text-anchor="middle" fill="#f5c842" font-size="11">v2/LiveBoard/Station/{id}</text>

  <line x1="820" y1="762" x2="370" y2="762" stroke="#56d98a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="360" y1="778" x2="140" y2="778" stroke="#56d98a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="245" y="773" text-anchor="middle" fill="#56d98a" font-size="11">誤點與看板 {delays, boards}</text>
</svg>
